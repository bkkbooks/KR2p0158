body:
  text: 二車轍之鮅鮪不見江湖之水匹婦愚夫不知其鄉之小人君子食韭惡知終其世早與賢人是謂央行賢人不在側是謂迷惑不舉智謀是謂自欺早舉智謀是謂重基邦有巨雄必先舉之以為朋雖難之而弗惡必盡其故盡之而疑必拄裕裕其舉如將有敗雄是為割利木陰者不折其枝利其渚者不塞其溪善使其下若蚈蟲之足眾而不害害而不仆善事其上者若齒之事舌而終弗憒善事其君者若兩輪之相轉而終不相敗善使其民者若四時一遣一來而民弗害也山亡嶞則阤城無蓑則阤士亡友不可君有謀臣則壤地不削士有謀友則言談不蚈雖勇力聞於邦不如材金玉盈室不如謀眾強甚多不如時故謀為可貴一家事乃有祏三雄一雌三壼一提一王母抱三嫛兒聲君而會視朝而入入之或入之至之或至之至而亡及也已
