body:
  text: 一凡說之道急者為首既得其急必有及之及之而不可必度以訛毋令知我彼邦亡將流澤而行言以始情以久非言不讎非德亡復言而苟牆有耳往言傷人來言傷己言之善足以終世三世之福不足以出亡口不慎而戶不閉惡言復己而死無日竊䮦者誅竊邦者為諸侯諸侯之門義士之所存
